name: Deploy to Firebase Hosting

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: firebase-hosting-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build_and_deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install
        run: npm ci

      - name: Build
        env:
          VITE_FIREBASE_API_KEY: ${{ secrets.VITE_FIREBASE_API_KEY }}
          VITE_FIREBASE_AUTH_DOMAIN: ${{ secrets.VITE_FIREBASE_AUTH_DOMAIN }}
          VITE_FIREBASE_PROJECT_ID: ${{ secrets.VITE_FIREBASE_PROJECT_ID }}
          VITE_FIREBASE_STORAGE_BUCKET: ${{ secrets.VITE_FIREBASE_STORAGE_BUCKET }}
          VITE_FIREBASE_MESSAGING_SENDER_ID: ${{ secrets.VITE_FIREBASE_MESSAGING_SENDER_ID }}
          VITE_FIREBASE_APP_ID: ${{ secrets.VITE_FIREBASE_APP_ID }}
          VITE_FIREBASE_MEASUREMENT_ID: ${{ secrets.VITE_FIREBASE_MEASUREMENT_ID }}
        run: npm run build

      - name: Deploy (Service Account - project scoped)
        if: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_OKAZCAR_79CED != '' }}
        uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: ${{ secrets.GITHUB_TOKEN }}
          firebaseServiceAccount: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_OKAZCAR_79CED }}
          channelId: live
          projectId: okazcar-79ced

      - name: Deploy (Service Account - generic)
        if: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_OKAZCAR_79CED == '' && secrets.FIREBASE_SERVICE_ACCOUNT != '' }}
        uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: ${{ secrets.GITHUB_TOKEN }}
          firebaseServiceAccount: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
          channelId: live
          projectId: okazcar-79ced

      - name: Deploy (fallback token)
        if: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_OKAZCAR_79CED == '' && secrets.FIREBASE_SERVICE_ACCOUNT == '' && secrets.FIREBASE_TOKEN != '' }}
        run: |
          npm i -g firebase-tools
          firebase deploy --only hosting --project okazcar-79ced --token "${FIREBASE_TOKEN}"
        env:
          FIREBASE_TOKEN: ${{ secrets.FIREBASE_TOKEN }}

      - name: Fail if missing deploy credentials
        if: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_OKAZCAR_79CED == '' && secrets.FIREBASE_SERVICE_ACCOUNT == '' && secrets.FIREBASE_TOKEN == '' }}
        run: |
          echo "Missing Firebase deploy credentials." >&2
          echo "Add one of these GitHub repository secrets:" >&2
          echo "- FIREBASE_SERVICE_ACCOUNT_OKAZCAR_79CED (recommended)" >&2
          echo "- FIREBASE_SERVICE_ACCOUNT" >&2
          echo "- FIREBASE_TOKEN" >&2
          exit 1
